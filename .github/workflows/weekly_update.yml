name: 每週股票資料更新

on:
  # 每週一 UTC 00:00（台灣時間週一 08:00）自動執行
  schedule:
    - cron: '0 0 * * 1'

  # 允許手動在 GitHub 網站上點擊觸發
  workflow_dispatch:

jobs:
  update-stock-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 允許 commit & push data.js

    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: 安裝相依套件
        run: pip install -r backend/requirements.txt

      - name: 抓取最新股票資料
        run: python3 backend/fetch_stocks.py

      - name: 提交並推送更新後的 data.js
        run: |
          git config user.name  "Stock Bot"
          git config user.email "actions@github.com"
          git add data.js data/stock_history.json
          # 只有資料有變動才 commit
          git diff --cached --quiet || git commit -m "📈 自動更新股票資料 $(date +'%Y-%m-%d')"
          git push
